name: Build add-on

on:
  workflow_call:
    inputs:
      addon:
        required: true
        type: string
      publish:
        required: true
        type: boolean

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      image_name: ${{ steps.normalize.outputs.image_name }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      version: ${{ steps.normalize.outputs.version }}
      name: ${{ steps.normalize.outputs.name }}
      description: ${{ steps.normalize.outputs.description }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Get add-on information
        id: info
        uses: home-assistant/actions/helpers/info@e91ad1948e57189485b9c1ad608af0c303946f89
        with:
          path: "./${{ inputs.addon }}"

      - name: Normalize add-on information
        id: normalize
        run: |
          image=${{ steps.info.outputs.image }}
          image_base="${image%%-\{arch\}}"
          echo "image_name=${image_base##*/}" >> "$GITHUB_OUTPUT"
          echo "registry_prefix=${image_base%/*}" >> "$GITHUB_OUTPUT"
          version=${{ steps.info.outputs.version }}
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          name=${{ steps.info.outputs.name }}
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          description=${{ steps.info.outputs.description }}
          echo "description=${description}" >> "$GITHUB_OUTPUT"

      - name: Prepare build matrix
        id: matrix
        uses: ./.github/actions/prepare-multi-arch-matrix
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.normalize.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          cache-gha-scope: ${{ inputs.addon }}-${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: "./${{ inputs.addon }}"
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          labels: |
            io.hass.type=addon
            io.hass.name=${{ needs.prepare.outputs.name }}
            io.hass.description=${{ needs.prepare.outputs.description }}
          push: ${{ inputs.publish }}
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs: [prepare, build]
    if: inputs.publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Publish multi-arch manifest
        uses: ./.github/actions/publish-multi-arch-manifest
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}
