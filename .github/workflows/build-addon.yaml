# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build add-on

on:
  workflow_call:
    inputs:
      addon:
        required: true
        type: string
      publish:
        required: true
        type: boolean

permissions: {}

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      image_name: ${{ steps.normalize.outputs.image_name }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      version: ${{ steps.normalize.outputs.version }}
      name: ${{ steps.normalize.outputs.name }}
      description: ${{ steps.normalize.outputs.description }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Get add-on information
        id: info
        uses: home-assistant/actions/helpers/info@f4ca6f671bd429efb108c0f2fa0ae8af0215986c
        with:
          path: "./${{ inputs.addon }}"

      - name: Normalize add-on information
        id: normalize
        env:
          ADDON_IMAGE: ${{ steps.info.outputs.image }}
          ADDON_VERSION: ${{ steps.info.outputs.version }}
          ADDON_NAME: ${{ steps.info.outputs.name }}
          ADDON_DESCRIPTION: ${{ steps.info.outputs.description }}
        run: |
          image="${ADDON_IMAGE%\"}"
          image="${image#\"}"
          image_base="${image%%-\{arch\}}"
          version="${ADDON_VERSION%\"}"
          version="${version#\"}"
          name="${ADDON_NAME%\"}"
          name="${name#\"}"
          description="${ADDON_DESCRIPTION%\"}"
          description="${description#\"}"
          {
            echo "image_name=${image_base##*/}";
            echo "registry_prefix=${image_base%/*}";
            echo "version=${version}";
            echo "name=${name}";
            echo "description=${description}";
          }  >> "$GITHUB_OUTPUT"

      - name: Prepare build matrix
        id: matrix
        uses: ./.github/actions/prepare-multi-arch-matrix
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.normalize.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build image
        uses: home-assistant/builder/actions/build-image@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # 2026.06.0
        with:
          arch: ${{ matrix.arch }}
          cache-gha-scope: ${{ inputs.addon }}-${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: "./${{ inputs.addon }}"
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          labels: |
            io.hass.type=addon
            io.hass.name=${{ needs.prepare.outputs.name }}
            io.hass.description=${{ needs.prepare.outputs.description }}
          push: ${{ inputs.publish }}
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs: [prepare, build]
    if: inputs.publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Publish multi-arch manifest
        uses: ./.github/actions/publish-multi-arch-manifest
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}
